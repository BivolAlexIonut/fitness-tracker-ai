<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Personalizare AI - FitnessTracker AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0a0a0a; margin: 0; }
        .onboarding-card { max-width: 600px; width: 90%; background: #141414; padding: 40px; border-radius: 20px; border: 1px solid #222; }
        .step-indicator { display: flex; gap: 10px; margin-bottom: 30px; }
        .step { flex: 1; height: 4px; background: #333; border-radius: 2px; }
        .step.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .option-card { background: #1a1a1a; border: 2px solid #333; padding: 20px; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.3s; }
        .option-card.selected { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="onboarding-card">
        <div class="step-indicator">
            <div class="step active" id="s1"></div>
            <div class="step" id="s2"></div>
            <div class="step" id="s3"></div>
            <div class="step" id="s4"></div>
        </div>

        <div id="step-1">
            <h2>Obiectiv Principal</h2>
            <div class="option-grid">
                <div class="option-card" onclick="selectGoal(this, 'Weight Loss')"><h3>Slăbire</h3></div>
                <div class="option-card" onclick="selectGoal(this, 'Muscle Gain')"><h3>Masă Musculară</h3></div>
                <div class="option-card" onclick="selectGoal(this, 'Endurance')"><h3>Rezistență</h3></div>
                <div class="option-card" onclick="selectGoal(this, 'Maintenance')"><h3>Menținere</h3></div>
            </div>
            <button class="btn-primary" style="width:100%" onclick="nextStep(2)">Continuă</button>
        </div>

        <div id="step-2" class="hidden">
            <h2>Rutina de Sport</h2>
            <div class="form-group">
                <label>Ce sport practici?</label>
                <input type="text" id="sports-type" class="modern-input" placeholder="ex: CrossFit, Gym">
            </div>
            <div class="form-group">
                <label>Frecvență săptămânală</label>
                <select id="training-frequency" class="modern-select">
                    <option value="3">3 zile/săptămână</option>
                    <option value="5">5 zile/săptămână</option>
                </select>
            </div>
            <button class="btn-primary" style="width:100%" onclick="nextStep(3)">Pasul următor</button>
        </div>

        <div id="step-3" class="hidden">
            <h2>Biometrie Avansată</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>% Grăsime</label>
                    <input type="number" step="0.1" id="reg-fat" class="modern-input" placeholder="15.0">
                </div>
                <div class="form-group">
                    <label>Masă Musculară (kg)</label>
                    <input type="number" step="0.1" id="reg-muscle" class="modern-input" placeholder="35.0">
                </div>
                <div class="form-group">
                    <label>Grupa Sangvină</label>
                    <input type="text" id="reg-blood" class="modern-input" placeholder="A+">
                </div>
            </div>
            <button class="btn-primary" style="width:100%" onclick="nextStep(4)">Mai avem puțin</button>
        </div>

        <div id="step-4" class="hidden">
            <h2>Note pentru AI</h2>
            <textarea id="additional-notes" class="modern-textarea" placeholder="Accidentări vechi, preferințe..."></textarea>
            <button class="btn-primary" style="width:100%; margin-top:20px;" id="btn-finish">Finalizează Profilul</button>
        </div>
    </div>

    <script>
        let data = { fitnessGoal: '', sportsType: '', trainingFrequency: 3, bodyFatPercentage: 0, muscleMass: 0, bloodType: '', additionalNotes: '' };
        function selectGoal(el, goal) {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            data.fitnessGoal = goal;
        }
        function nextStep(s) {
            document.querySelectorAll('[id^="step-"]').forEach(d => d.classList.add('hidden'));
            document.getElementById('step-' + s).classList.remove('hidden');
            document.getElementById('s' + s).classList.add('active');
        }
        document.getElementById('btn-finish').onclick = async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            data.sportsType = document.getElementById('sports-type').value;
            data.bodyFatPercentage = parseFloat(document.getElementById('reg-fat').value);
            data.muscleMass = parseFloat(document.getElementById('reg-muscle').value);
            data.bloodType = document.getElementById('reg-blood').value;
            data.additionalNotes = document.getElementById('additional-notes').value;

            const res = await fetch(`http://127.0.0.1:8080/api/user/preferences?userId=${user.userId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) window.location.href = 'index.html';
        };
    </script>
</body>
</html>
