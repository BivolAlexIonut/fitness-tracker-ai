name: Athletica AI - Full CI (Tests & Docker Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Elimina warning-ul despre Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Job pentru testele de Python (AI Service)
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          cd ai-service-python
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd ai-service-python
          python -m pytest

  # 2. Job pentru testele de Java (Backend)
  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Java Tests (Maven)
        run: |
          cd backend-java/app
          chmod +x mvnw
          ./mvnw test

  # 3. Job pentru verificarea Build-ului Docker
  docker-build-check:
    needs: [test-python, test-java]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build AI Service Image
        run: |
          # Folosim calea explicita catre Dockerfile (case-sensitive pe Linux/GitHub)
          docker build -t athletica-ai-python:latest -f ai-service-python/Dockerfile ai-service-python

      - name: Build Java Backend Image
        run: |
          docker build -t athletica-ai-java:latest -f backend-java/app/Dockerfile backend-java/app
