name: Athletica AI - Full CI (Tests & Docker Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Job pentru testele de Python (AI Service)
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          cd ai-service-python
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd ai-service-python
          python -m pytest

  # 2. Job pentru testele de Java (Backend)
  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Java Tests (Maven)
        run: |
          cd backend-java/app
          chmod +x mvnw
          ./mvnw test

  # 3. Job pentru verificarea Build-ului Docker
  # Se ruleaza doar daca testele de Python si Java trec (needs)
  docker-build-check:
    needs: [test-python, test-java]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build AI Service Image
        run: docker build ./ai-service-python --file ./ai-service-python/Dockerfile --tag athletica-ai-python:latest

      - name: Build Java Backend Image
        run: docker build ./backend-java/app --file ./backend-java/app/Dockerfile --tag athletica-ai-java:latest
